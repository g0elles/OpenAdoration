version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    # Bumps land on dev (integration branch); only curated batches reach master via PR.
    # Note: security updates still target the default branch regardless of this.
    target-branch: "dev"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Version-locked package families must bump together or restore fails (NU1605):
    # EF Core packages require each other at the same version; the Extensions stack aligns too.
    groups:
      entity-framework-core:
        patterns:
          - "Microsoft.EntityFrameworkCore*"
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"

  - package-ecosystem: github-actions
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
