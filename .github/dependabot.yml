version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Version-locked package families must bump together or restore fails (NU1605):
    # EF Core packages require each other at the same version; the Extensions stack aligns too.
    groups:
      entity-framework-core:
        patterns:
          - "Microsoft.EntityFrameworkCore*"
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
