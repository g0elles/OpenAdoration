name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

jobs:
  build-test:
    runs-on: windows-latest  # WPF + UseWindowsForms target net10.0-windows
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore OpenAdoration.sln

      - name: Build
        run: dotnet build OpenAdoration.sln -c Release --no-restore

      - name: Test
        run: dotnet test OpenAdoration.Tests.Infrastructure -c Release --no-build
